<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPredictor Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="logo">
                <i class="fas fa-filter"></i> LeadPredictor
            </div>
        </header>

        <div class="main-container">
            <!-- Left Sidebar -->
            <aside class="sidebar panel">
                <div class="input-group">
                    <label data-i18n="language">Language</label>
                    <div style="position: relative;">
                        <select id="language-select" class="select-wrapper" style="appearance: none; width: 100%;">
                            <option value="en">🇺🇸 English</option>
                            <option value="bg">🇧🇬 Български</option>
                            <option value="de">🇩🇪 Deutsch</option>
                            <option value="fr">🇫🇷 Français</option>
                        </select>
                        <i class="fas fa-chevron-down" style="position: absolute; right: 12px; top: 12px; pointer-events: none; color: var(--text-primary);"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label data-i18n="currency">Currency</label>
                    <div style="position: relative;">
                        <select id="currency-select" class="select-wrapper" style="appearance: none; width: 100%;">
                            <option value="$">$ US Dollar</option>
                            <option value="€">€ EUR</option>
                            <option value="CHF">CHF</option>
                            <option value="£">£ GBP</option>
                        </select>
                        <i class="fas fa-chevron-down" style="position: absolute; right: 12px; top: 12px; pointer-events: none; color: var(--text-primary);"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label data-i18n="campaignStart">Campaign Start</label>
                    <input type="date" value="2026-05-08">
                </div>

                <div class="input-group">
                    <label data-i18n="campaignEnd">Campaign End</label>
                    <input type="date" value="2026-11-04">
                </div>

                <div class="separator"></div>

                <div class="input-group">
                    <label data-i18n="totalRevenue">Total Revenue</label>
                    <div class="input-with-icon">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="revenue" value="10000">
                    </div>
                </div>

                <div class="input-group">
                    <label data-i18n="avgOrderValue">Avg. Order Value</label>
                    <div class="input-with-icon">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="aov" value="1000">
                    </div>
                </div>
            </aside>

            <!-- Center Content -->
            <div class="center-content">
                <div class="chart-panel panel">
                    <div class="chart-container" id="chart-container">
                        <!-- Chart rows will be generated by JS -->
                        <div class="y-axis-labels">
                            <span>1</span>
                            <span>2</span>
                            <span>3</span>
                            <span>4</span>
                            <span>5</span>
                            <span>6</span>
                        </div>
                        <div class="chart-area" id="chart-area">
                            <div class="grid-lines">
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                            <div class="bars" id="bars-container">
                                <!-- Bars created via JS -->
                            </div>
                        </div>
                    </div>
                    <div class="x-axis-labels" id="x-axis-labels">
                        <!-- x-axis generated by js -->
                    </div>
                </div>

                <div class="sliders-panel panel">
                    <div class="slider-group">
                        <div class="slider-header">
                            <label data-i18n="leadResponseRate">Lead Response Rate</label>
                        </div>
                        <input type="range" id="lead-rate" min="1" max="100" value="40" step="0.1">
                        <div class="slider-value"><span id="lead-rate-val">40.00</span>%</div>
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <label data-i18n="prospectResponseRate">Prospect Response Rate</label>
                        </div>
                        <input type="range" id="prospect-rate" min="1" max="100" value="20" step="0.1">
                        <div class="slider-value"><span id="prospect-rate-val">20.00</span>%</div>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <aside class="right-sidebar">
                <div class="stat-card panel">
                    <div class="stat-header">
                        <div class="stat-title"><i class="fas fa-folder"></i> <span data-i18n="prospects">Prospects</span></div>
                        <div class="stat-percent">100%</div>
                    </div>
                    <div class="stat-value" id="val-prospects">125</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 100%;"></div>
                    </div>
                </div>

                <div class="stat-card panel">
                    <div class="stat-header">
                        <div class="stat-title"><i class="fas fa-user"></i> <span data-i18n="leads">Leads</span></div>
                        <div class="stat-percent" id="pct-leads">20%</div>
                    </div>
                    <div class="stat-value" id="val-leads">25</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="bar-leads" style="width: 20%;"></div>
                    </div>
                </div>

                <div class="stat-card panel">
                    <div class="stat-header">
                        <div class="stat-title"><i class="fas fa-trophy"></i> <span data-i18n="customers">Customers</span></div>
                        <div class="stat-percent" id="pct-customers">8%</div>
                    </div>
                    <div class="stat-value" id="val-customers">10</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="bar-customers" style="width: 8%;"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="chart-tooltip" class="tooltip">
        <div class="tt-title" id="tt-month-container"><span data-i18n="month">Month</span> #<span id="tt-month-num">3</span></div>
        <div><span data-i18n="prospects">Prospects</span>: <span id="tt-prospects">63</span></div>
        <div><span data-i18n="leads">Leads</span>: <span id="tt-leads">13</span></div>
        <div><span data-i18n="customers">Customers</span>: <span id="tt-customers">5</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
